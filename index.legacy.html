<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RIVLET — Move like you mean it.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0E0B07;
    --ink-70:rgba(14,11,7,.70);
    --ink-50:rgba(14,11,7,.50);
    --ink-30:rgba(14,11,7,.30);
    --ink-10:rgba(14,11,7,.10);
    --bg:#FFFFFF;
    --bg-soft:#F6F4EF;
    --gold:#C4963A;
    --cardamom:#7A5C3A;
    --navy:#0C1E34;
    --sand:#F2EDE3;
    --linen:#FDFAF4;

    --display:"Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --serif:"Cormorant Garamond", Georgia, serif;
    --mono:"DM Mono", ui-monospace, SFMono-Regular, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--display);font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-0.01em}
  body{overflow-x:hidden}
  ::selection{background:var(--ink);color:var(--bg)}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer}

  .wrap{max-width:80rem;margin:0 auto;padding:0 24px}

  /* ---------- Animations ---------- */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeInOverlay{from{opacity:0}to{opacity:1}}
  @keyframes fadeInDialog{from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}
  .anim{opacity:0;animation:fadeInUp .7s cubic-bezier(.2,.7,.2,1) forwards}
  .anim-overlay{animation:fadeInOverlay .35s ease-out forwards}
  .anim-dialog{animation:fadeInDialog .55s cubic-bezier(.2,.7,.2,1) forwards}

  /* ---------- Nav ---------- */
  nav.top{
    padding:18px 24px;display:flex;align-items:center;justify-content:space-between;
    max-width:80rem;margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{
    width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--linen) 0%, var(--linen) 35%, var(--ink) 36%, var(--ink) 100%);
    border:1.5px solid var(--ink);
    box-shadow:0 0 0 0 rgba(196,150,58,.0), 0 0 14px rgba(196,150,58,.0);
    transition:box-shadow .4s ease;
  }
  .brand:hover .brand-mark{box-shadow:0 0 0 1px rgba(196,150,58,.2), 0 0 14px rgba(196,150,58,.45)}
  .brand-text{font-size:18px;font-weight:600;letter-spacing:-0.02em;color:var(--ink)}

  .nav-links{display:none;align-items:center;gap:30px}
  @media (min-width:880px){ .nav-links{display:flex} }
  .nav-links a{font-size:14px;color:var(--ink-70);font-weight:500;display:inline-flex;align-items:center;gap:4px;transition:color .25s ease}
  .nav-links a:hover{color:var(--ink)}
  .chev{width:13px;height:13px;opacity:.7}

  .nav-right{display:flex;align-items:center;gap:14px}
  .login{font-size:14px;color:var(--ink-70);font-weight:500}
  .login:hover{color:var(--ink)}
  .pill{background:var(--ink);color:var(--bg);padding:10px 22px;border-radius:999px;font-size:14px;font-weight:500;border:0;transition:background .25s ease, transform .4s ease}
  .pill:hover{background:#2a1d0e}
  .pill.outline{background:transparent;color:var(--ink);border:1px solid var(--ink-10)}
  .pill.outline:hover{background:var(--bg-soft);border-color:var(--ink-30)}

  /* ---------- Hero ---------- */
  .hero{padding:80px 24px 100px;max-width:80rem;margin:0 auto;text-align:center;position:relative}
  .hero::before{
    content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:1100px;max-width:120%;height:560px;pointer-events:none;z-index:-1;
    background:radial-gradient(50% 60% at 50% 0%, rgba(196,150,58,.10) 0%, rgba(196,150,58,0) 70%);
  }

  .badge{
    display:inline-flex;align-items:center;gap:10px;
    padding:6px 14px 6px 8px;border:1px solid var(--ink-10);border-radius:999px;
    font-size:13.5px;font-weight:500;color:var(--ink);
    margin-bottom:32px;
  }
  .badge .sq{
    width:24px;height:24px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 30% 30%, #c4963a 0%, #8a6a2a 45%, #0E0B07 100%);
    box-shadow:0 0 0 1px rgba(196,150,58,.35), 0 0 12px rgba(196,150,58,.35);
  }
  .badge .sq svg{width:13px;height:13px;color:#fff;filter:drop-shadow(0 0 2px rgba(255,236,200,.6))}

  h1.hero-h{
    font-family:var(--display);font-weight:400;
    font-size:clamp(46px, 7.6vw, 92px);
    line-height:1.04;letter-spacing:-0.035em;
    margin-bottom:22px;
  }
  h1.hero-h .l1{display:block;color:var(--ink)}
  h1.hero-h .l2{
    display:block;
    background:linear-gradient(90deg, #0E0B07 0%, #5b4a2c 45%, #c4963a 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    font-family:var(--serif);font-style:italic;font-weight:400;letter-spacing:-0.02em;
  }

  .hero-sub{
    font-size:clamp(16px,1.3vw,19px);color:var(--ink-70);
    max-width:46rem;margin:0 auto 32px;line-height:1.55;text-wrap:pretty;
  }

  .hero-cta{
    background:var(--ink);color:var(--bg);
    padding:14px 30px;border-radius:999px;
    font-size:15px;font-weight:500;border:0;cursor:pointer;
    transition:background .25s ease, transform .3s ease;
    display:inline-flex;align-items:center;gap:10px;
    margin-bottom:48px;
  }
  .hero-cta:hover{background:#2a1d0e}
  .hero-cta .arr{width:16px;height:16px;transition:transform .35s ease}
  .hero-cta:hover .arr{transform:translateX(3px)}

  /* ---------- Tabs ---------- */
  .tabs-wrap{display:flex;justify-content:center;margin-bottom:32px}
  .tabs{
    display:inline-flex;align-items:stretch;
    background:var(--bg-soft);border-radius:14px;padding:5px;gap:0;
    border:1px solid var(--ink-10);
  }
  .tab{
    background:transparent;border:0;
    padding:10px 18px;border-radius:10px;
    font-size:14px;font-weight:500;color:var(--ink-70);
    display:inline-flex;align-items:center;gap:8px;
    transition:background .3s ease, color .3s ease, box-shadow .3s ease;
    white-space:nowrap;
  }
  .tab .ico{width:16px;height:16px;opacity:.85}
  .tab.active{background:var(--bg);color:var(--ink);box-shadow:0 1px 2px rgba(14,11,7,.06), 0 4px 12px rgba(14,11,7,.04)}
  .tab-divider{width:1px;background:var(--ink-10);margin:6px 0;align-self:stretch}
  .tab-divider.hide{visibility:hidden}
  @media (max-width:760px){
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:6px;width:100%;max-width:380px}
    .tab-divider{display:none}
    .tab{justify-content:center;width:100%}
  }

  /* ---------- Editorial showcase: two-column wardrobe ---------- */
  .ed-show{
    display:grid;grid-template-columns:1fr;gap:24px;
    background:var(--bg-soft);
    border-radius:24px;
    padding:28px;
    border:1px solid var(--ink-10);
  }
  @media (min-width:880px){ .ed-show{grid-template-columns:1fr 1.1fr;gap:36px;padding:40px} }
  .ed-left .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--cardamom);margin-bottom:18px}
  .ed-left h3.ed-title{
    font-family:var(--display);font-weight:400;font-size:clamp(38px,4.8vw,58px);
    line-height:1.0;letter-spacing:-0.035em;color:var(--ink);margin-bottom:18px;
  }
  .ed-left h3.ed-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--cardamom)}
  .ed-left .ed-sub{font-size:15px;color:var(--ink-70);line-height:1.55;max-width:36ch;margin-bottom:24px}
  .ed-list{border-top:1px solid var(--ink-10);margin-top:8px}
  .ed-row{
    display:grid;grid-template-columns:48px 1fr;gap:16px;padding:18px 0;
    border-bottom:1px solid var(--ink-10);
    cursor:pointer;align-items:start;
    transition:padding-left .35s ease, background .35s ease;
  }
  .ed-row:hover{padding-left:8px}
  .ed-row.is-active{background:linear-gradient(90deg, rgba(196,150,58,.10), rgba(196,150,58,0) 70%)}
  .ed-row .ed-num{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--cardamom);padding-top:4px}
  .ed-row .ed-num::before{content:"— "}
  .ed-row .ed-rt{font-family:var(--display);font-weight:600;font-size:18px;color:var(--ink);letter-spacing:-0.01em;margin-bottom:4px}
  .ed-row.is-active .ed-rt{color:var(--ink)}
  .ed-row .ed-rb{font-size:14px;color:var(--ink-70);line-height:1.55;max-width:42ch}
  /* right dark frame */
  .ed-frame{
    position:relative;border-radius:18px;overflow:hidden;
    background:var(--navy);min-height:clamp(380px, 48vw, 520px);
    border:1px solid rgba(7,17,30,.4);
  }
  .ed-frame .bg-img{
    position:absolute;inset:0;
    background-image:url("assets/fabric-1.jpg");
    background-size:cover;background-position:center;
    filter:saturate(.85) brightness(.78) contrast(1.05);
    transform:scale(1.05);animation:slowDrift 22s ease-in-out infinite alternate;
    transition:opacity .8s ease;
  }
  @keyframes slowDrift{0%{transform:scale(1.05) translate3d(0,0,0)}100%{transform:scale(1.10) translate3d(-1.5%,-1%,0)}}
  .ed-frame .tint{
    position:absolute;inset:0;
    background:
      radial-gradient(120% 70% at 50% 100%, rgba(7,17,30,.88) 0%, rgba(7,17,30,.55) 45%, rgba(7,17,30,.20) 80%),
      linear-gradient(180deg, rgba(7,17,30,.30) 0%, rgba(7,17,30,.10) 40%, rgba(7,17,30,.70) 100%);
  }
  .ed-frame .ed-inner{
    position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;
    padding:40px;color:var(--bg);z-index:2;
  }
  .ed-frame .ed-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(253,250,244,.65);margin-bottom:18px}
  .ed-frame .ed-h{font-family:var(--display);font-weight:400;font-size:clamp(28px,3.6vw,44px);line-height:1.05;letter-spacing:-0.025em;color:var(--bg);margin-bottom:14px;max-width:18ch}
  .ed-frame .ed-h em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--gold)}
  .ed-frame .ed-body{font-size:15px;color:rgba(253,250,244,.78);line-height:1.55;max-width:46ch;margin-bottom:24px}
  .ed-frame .ed-cta{
    display:inline-flex;align-items:center;gap:10px;align-self:flex-start;
    background:transparent;border:0;padding:0;
    font-family:var(--display);font-size:15px;font-weight:500;color:var(--bg);
    cursor:pointer;
  }
  .ed-frame .ed-cta .arr{
    width:36px;height:36px;border-radius:50%;background:rgba(253,250,244,.10);
    display:inline-flex;align-items:center;justify-content:center;
    transition:background .25s ease, transform .35s ease;
  }
  .ed-frame .ed-cta:hover .arr{background:rgba(253,250,244,.20);transform:translateX(2px)}
  .ed-frame .corner{position:absolute;z-index:3;font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:rgba(253,250,244,.6);text-transform:uppercase}
  .ed-frame .corner.tl{top:22px;left:24px}
  .ed-frame .corner.tr{top:22px;right:24px}
  .ed-frame .corner.bl{bottom:22px;right:24px}

  /* ---------- Mill marquee ---------- */
  .mills{margin-top:96px;padding:32px 0;border-top:1px solid var(--ink-10);border-bottom:1px solid var(--ink-10);overflow:hidden}
  .mills .label{font-family:var(--mono);font-size:11px;letter-spacing:.24em;color:var(--cardamom);text-transform:uppercase;text-align:center;margin-bottom:18px}
  .m-track{display:flex;width:max-content;animation:marqueeMove 38s linear infinite}
  @keyframes marqueeMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .m-track:hover{animation-play-state:paused}
  .m-item{margin:0 30px;flex-shrink:0;white-space:nowrap;color:var(--ink-50)}

  /* ---------- Sections ---------- */
  section.block{padding:96px 24px;max-width:80rem;margin:0 auto}
  h2.disp{
    font-family:var(--display);font-weight:400;
    font-size:clamp(38px,5.6vw,68px);line-height:1.04;letter-spacing:-0.035em;
    text-wrap:balance;
  }
  h2.disp em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--cardamom)}
  .lead{font-size:clamp(18px,1.4vw,22px);color:var(--ink-70);line-height:1.55;text-wrap:pretty}

  /* ---------- Vision section (with fabric bg) ---------- */
  .vision-section{position:relative;isolation:isolate}
  .vision-section::before{
    content:"";position:absolute;inset:0;z-index:-1;
    background-image:url('assets/vision-fabric.jpg');
    background-size:cover;background-position:center;background-repeat:no-repeat;
    /* Feather all four edges into the page bg */
    -webkit-mask-image:
      radial-gradient(120% 95% at 50% 50%, #000 45%, rgba(0,0,0,.65) 65%, rgba(0,0,0,0) 92%),
      linear-gradient(to right, transparent 0%, #000 14%, #000 86%, transparent 100%),
      linear-gradient(to bottom, transparent 0%, #000 12%, #000 88%, transparent 100%);
    -webkit-mask-composite:source-in;
            mask-image:
      radial-gradient(120% 95% at 50% 50%, #000 45%, rgba(0,0,0,.65) 65%, rgba(0,0,0,0) 92%),
      linear-gradient(to right, transparent 0%, #000 14%, #000 86%, transparent 100%),
      linear-gradient(to bottom, transparent 0%, #000 12%, #000 88%, transparent 100%);
            mask-composite:intersect;
    opacity:.78;
  }
  .vision-section::after{
    /* warm wash to harmonize fabric with page bg */
    content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(80% 60% at 50% 0%, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 70%),
      radial-gradient(80% 60% at 50% 100%, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 70%);
  }

  /* ---------- 3-up vision ---------- */
  .vision-grid{display:grid;grid-template-columns:1fr;gap:18px;margin-top:48px}
  @media (min-width:760px){ .vision-grid{grid-template-columns:repeat(3,1fr)} }
  .v-card{
    background:rgba(255,255,255,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.7);border-radius:20px;
    padding:28px;display:flex;flex-direction:column;gap:14px;min-height:280px;
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 18px 40px -28px rgba(14,11,7,.18);
    transition:transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s ease, border-color .5s ease, background .5s ease;
  }
  .v-card:hover{transform:translateY(-4px);background:rgba(255,255,255,.92);box-shadow:0 24px 50px -28px rgba(14,11,7,.22);border-color:rgba(255,255,255,.9)}
  .v-num{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--cardamom);display:flex;justify-content:space-between;align-items:center}
  .v-num .dash{flex:1;height:1px;background:var(--ink-10);margin:0 12px}
  .v-card h3{font-family:var(--display);font-weight:500;font-size:24px;letter-spacing:-0.025em;line-height:1.15;color:var(--ink);margin-top:auto}
  .v-card h3 em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--cardamom)}
  .v-card p{font-size:14.5px;color:var(--ink-70);line-height:1.6}

  /* ---------- Difference (3 pillars) ---------- */
  .diff{padding:96px 24px;border-top:1px solid var(--ink-10);max-width:80rem;margin:0 auto;position:relative}
  .diff::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:120px;height:1px;background:var(--cardamom)}
  .diff .head{display:grid;grid-template-columns:1fr;gap:24px;align-items:end;margin-bottom:56px}
  @media (min-width:880px){ .diff .head{grid-template-columns:1.4fr 1fr} }
  .diff .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--cardamom);margin-bottom:18px}
  .diff .head h2{font-family:var(--display);font-weight:400;font-size:clamp(36px,5vw,64px);line-height:1.04;letter-spacing:-0.035em;color:var(--ink)}
  .diff .head h2 em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--cardamom)}
  .diff .head .lede{font-size:16px;color:var(--ink-70);line-height:1.6;max-width:42ch;text-wrap:pretty;justify-self:end}
  @media (max-width:879px){ .diff .head .lede{justify-self:start} }

  .diff-grid{display:none}
  .diff-card{display:none}
  .diff-card-OLD{
    position:relative;
    background:var(--bg);border:1px solid var(--ink-10);border-radius:22px;
    padding:32px;display:flex;flex-direction:column;gap:18px;min-height:420px;
    transition:transform .55s cubic-bezier(.2,.7,.2,1), box-shadow .55s ease, border-color .55s ease;
    overflow:hidden;
  }
  /* Comparison ledger */
  .cmp{border:1px solid var(--ink-10);border-radius:20px;overflow:hidden;background:var(--bg)}
  .cmp-head{display:grid;grid-template-columns:80px 1fr 1fr;border-bottom:1px solid var(--ink-10)}
  .cmp-head > div{padding:18px 24px;font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase}
  .cmp-head .lbl-n{color:var(--ink-50)}
  .cmp-head .lbl-them{color:var(--ink-50);border-left:1px solid var(--ink-10)}
  .cmp-head .lbl-us{color:var(--cardamom);border-left:1px solid var(--ink-10);background:rgba(196,150,58,.04)}
  .cmp-head .lbl-us .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block;margin-right:8px;vertical-align:middle;box-shadow:0 0 8px rgba(196,150,58,.6)}
  .cmp-row{display:grid;grid-template-columns:80px 1fr 1fr;border-bottom:1px solid var(--ink-10);transition:background .4s ease}
  .cmp-row:last-child{border-bottom:0}
  .cmp-row:hover{background:rgba(14,11,7,.015)}
  .cmp-row > div{padding:32px 24px}
  .cmp-num{font-family:var(--mono);font-size:11px;letter-spacing:.24em;color:var(--cardamom);align-self:start}
  .cmp-them{border-left:1px solid var(--ink-10)}
  .cmp-them .topic{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-50);margin-bottom:10px}
  .cmp-them h4{font-family:var(--display);font-weight:500;font-size:clamp(18px,1.7vw,22px);line-height:1.25;letter-spacing:-0.02em;color:var(--ink-50);text-decoration:line-through;text-decoration-color:rgba(14,11,7,.25);text-decoration-thickness:1px;margin-bottom:10px}
  .cmp-them p{font-size:14px;line-height:1.6;color:var(--ink-50);max-width:48ch}
  .cmp-us{border-left:1px solid var(--ink-10);background:linear-gradient(180deg, rgba(196,150,58,.05) 0%, rgba(196,150,58,0) 100%);position:relative}
  .cmp-us::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg, var(--gold) 0%, rgba(196,150,58,0) 100%)}
  .cmp-us .topic{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--cardamom);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .cmp-us .topic .mark{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #c4963a 0%, #8a6a2a 50%, #0E0B07 100%);display:inline-flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 0 0 1px rgba(196,150,58,.4), 0 0 8px rgba(196,150,58,.35)}
  .cmp-us h4{font-family:var(--display);font-weight:500;font-size:clamp(20px,1.9vw,26px);line-height:1.2;letter-spacing:-0.02em;color:var(--ink);margin-bottom:10px}
  .cmp-us h4 em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--cardamom)}
  .cmp-us p{font-size:14.5px;line-height:1.6;color:var(--ink);max-width:50ch;text-wrap:pretty}
  @media (max-width:760px){
    .cmp-head, .cmp-row{grid-template-columns:1fr}
    .cmp-head .lbl-n{display:none}
    .cmp-head .lbl-them, .cmp-head .lbl-us{border-left:0;border-bottom:1px solid var(--ink-10)}
    .cmp-row > div{padding:22px}
    .cmp-them, .cmp-us{border-left:0;border-top:1px solid var(--ink-10)}
    .cmp-num{padding-bottom:0}
  }
  /* Manifesto strip — gap statement */
  .gap-strip{margin-top:32px;background:var(--ink);color:var(--bg);border-radius:20px;overflow:hidden;position:relative;padding:64px 48px;display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:center}

<script>
  const EMAILJS_PUBLIC_KEY   = "YOUR_PUBLIC_KEY";        // ← Account > API Keys
  const EMAILJS_SERVICE_ID   = "YOUR_SERVICE_ID";        // ← Email Service ID
